# HarborMaster Live GitHub Source Spec (JSONL Backend)
name: hm_github_live
version: 0.1.0
dsl_version: 3
backend: jsonl
test_queries:
  - SELECT id, title FROM hm_github_live.pull_requests LIMIT 1
inputs:
  GITHUB_DATA_DIR:
    kind: variable
    hint: Local directory containing live github jsonl data.
tables:
  - name: pull_requests
    description: Open pull requests from the configured GitHub repositories.
    source:
      location: "{{input.GITHUB_DATA_DIR}}/github_live/"
      glob: "*.jsonl"
    columns:
      - name: id
        type: Utf8
      - name: title
        type: Utf8
      - name: state
        type: Utf8
      - name: draft
        type: Boolean
      - name: created_at
        type: Utf8
      - name: updated_at
        type: Utf8
      - name: html_url
        type: Utf8
      - name: author_login
        type: Utf8
