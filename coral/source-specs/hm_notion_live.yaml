# HarborMaster Live Notion Source Spec (JSONL Backend)
name: hm_notion_live
version: 0.1.0
dsl_version: 3
backend: file
test_queries:
  - SELECT id, title FROM hm_notion_live.pages LIMIT 1
inputs:
  NOTION_DATA_DIR:
    kind: variable
    hint: Local directory containing live notion jsonl data.
tables:
  - name: pages
    description: Pages and documents from your Notion workspace.
    format: jsonl
    source:
      location: "file:///{{input.NOTION_DATA_DIR}}/notion_live/"
      glob: "*.jsonl"
    columns:
      - name: id
        type: Utf8
      - name: title
        type: Utf8
      - name: last_edited
        type: Utf8
      - name: url
        type: Utf8
