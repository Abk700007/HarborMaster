# HarborMaster Live Discord Source Spec (JSONL Backend)
name: discord
version: 0.1.0
dsl_version: 3
backend: jsonl
test_queries:
  - SELECT id, content FROM discord.messages LIMIT 1
inputs:
  DISCORD_DATA_DIR:
    kind: variable
    hint: Local directory containing live discord jsonl data.
tables:
  - name: messages
    description: Live Discord messages from community channels.
    source:
      location: "{{input.DISCORD_DATA_DIR}}/discord/"
      glob: "*.jsonl"
    columns:
      - name: id
        type: Utf8
      - name: channel_id
        type: Utf8
      - name: content
        type: Utf8
      - name: timestamp
        type: Timestamp
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: path
            path: [timestamp]
      - name: author__id
        type: Utf8
      - name: author__username
        type: Utf8
      - name: mention_usernames
        type: Utf8
